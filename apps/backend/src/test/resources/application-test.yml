spring:
  datasource:
    url: jdbc:h2:mem:triage_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

app:
  model:
    provider: heuristic
    policy:
      min-green-confidence: 0.7
  jwt:
    secret: change-this-secret-key-change-this-secret-key-123456
    access-ttl-seconds: 3600
  stt:
    provider: stub
